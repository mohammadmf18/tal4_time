<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول المدير</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;600&display=swap');
        
        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-box {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #2d3748;
        }
        
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }
        
        .error {
            color: red;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 تسجيل دخول المدير</h1>
        <form onsubmit="login(event)">
            <input type="text" id="username" placeholder="اسم المستخدم" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit">دخول</button>
        </form>
        <p class="error" id="error"></p>
    </div>
    
    <script>
        // تحذير: هذا النظام يستخدم مصادقة محلية فقط بدون خادم.
        // لا تستخدم هذه الصفحة لحماية بيانات حساسة حقيقية.
        // لتغيير بيانات الدخول، استخدم الدالة setAdminCredentials() في وحدة التحكم.

        function _getCredentials() {
            const stored = localStorage.getItem('admin_credentials');
            if (stored) {
                try { return JSON.parse(stored); } catch(e) {}
            }
            // الافتراضي: يجب على المستخدم تعيين بيانات عبر setAdminCredentials()
            return null;
        }

        // دالة مساعدة: شغّلها من وحدة التحكم لتعيين بيانات الدخول
        // مثال: setAdminCredentials('admin', 'كلمة_سر_جديدة')
        window.setAdminCredentials = function(username, password) {
            localStorage.setItem('admin_credentials', JSON.stringify({ u: username, p: password }));
            alert('تم حفظ بيانات الدخول بنجاح');
        };

        function login(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const creds = _getCredentials();

            if (!creds) {
                document.getElementById('error').textContent = '⚠️ لم يتم تعيين بيانات الدخول بعد. افتح وحدة التحكم واستخدم setAdminCredentials()';
                return;
            }

            if (username === creds.u && password === creds.p) {
                sessionStorage.setItem('admin_logged_in', 'true');
                sessionStorage.setItem('admin_username', username);
                setTimeout(() => { window.location.href = 'admin_dashboard.html'; }, 100);
            } else {
                document.getElementById('error').textContent = '❌ خطأ في البيانات';
            }
        }

        if (sessionStorage.getItem('admin_logged_in') === 'true') {
            window.location.href = 'admin_dashboard.html';
        }
    </script>
</body>
</html>
