<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="google-adsense-account" content="ca-pub-5471044003678571">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة ساعات العمل</title>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5471044003678571" crossorigin="anonymous"></script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WT18TH9QLV"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-WT18TH9QLV');
    </script>

    <script src="analytics-tracker.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6B7FD7;
            --primary-dark: #5568c4;
            --secondary: #8B7EC8;
            --bg-from: #5c70cc;
            --bg-to: #7c6dbf;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', 'Tajawal', sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, var(--bg-from) 0%, var(--bg-to) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* ── خلفية متحركة ── */
        body::before {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
            top: -200px; right: -150px;
            animation: drift 20s ease-in-out infinite;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            bottom: -150px; left: -100px;
            animation: drift 25s ease-in-out infinite reverse;
            pointer-events: none;
        }
        @keyframes drift {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(30px, -30px); }
        }

        /* ── وضع داكن ── */
        body.dark-mode {
            background: linear-gradient(145deg, #1a2040 0%, #252d52 100%);
        }

        /* ── زر الوضع الداكن ── */
        .theme-btn {
            position: fixed;
            top: 1.5rem; left: 1.5rem;
            width: 48px; height: 48px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
            z-index: 100;
        }
        .theme-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.08); }

        /* ── البطاقة الرئيسية ── */
        .hero {
            width: 100%;
            max-width: 500px;
            background: rgba(255,255,255,0.95);
            border-radius: 28px;
            padding: 3rem 2.5rem 2.5rem;
            box-shadow: 0 24px 70px rgba(0,0,0,0.18), 0 0 0 1px rgba(255,255,255,0.2) inset;
            text-align: center;
            position: relative;
            z-index: 1;
            animation: popIn 0.7s cubic-bezier(0.22,1,0.36,1);
        }
        @keyframes popIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)   scale(1); }
        }

        .dark-mode .hero {
            background: rgba(30,36,65,0.92);
            box-shadow: 0 24px 70px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.07) inset;
        }

        /* ── أيقونة ── */
        .hero-icon {
            width: 90px; height: 90px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            font-size: 2.6rem;
            margin: 0 auto 1.8rem;
            box-shadow: 0 12px 30px rgba(107,127,215,0.35);
            animation: iconFloat 4s ease-in-out infinite;
        }
        @keyframes iconFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* ── النص ── */
        .hero-title {
            font-family: 'Tajawal', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #1e2540;
            margin-bottom: 0.7rem;
            line-height: 1.2;
        }
        .dark-mode .hero-title { color: #eef1f8; }

        .hero-subtitle {
            color: #6b7a99;
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .dark-mode .hero-subtitle { color: #9aa5bf; }

        /* ── المميزات ── */
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        .feature-pill {
            background: rgba(107,127,215,0.08);
            border: 1px solid rgba(107,127,215,0.15);
            border-radius: 12px;
            padding: 0.65rem 0.9rem;
            font-size: 0.88rem;
            color: #4a5580;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.25s;
        }
        .feature-pill:hover {
            background: rgba(107,127,215,0.14);
            transform: translateY(-2px);
        }
        .dark-mode .feature-pill {
            background: rgba(107,127,215,0.12);
            border-color: rgba(107,127,215,0.25);
            color: #b0bcd4;
        }
        .feature-pill span { font-size: 1rem; }

        /* ── الزر ── */
        .cta-btn {
            display: block;
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 28px rgba(107,127,215,0.4);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
        }
        .cta-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.3s;
        }
        .cta-btn:hover { transform: translateY(-3px); box-shadow: 0 16px 36px rgba(107,127,215,0.5); }
        .cta-btn:active { transform: translateY(-1px); }

        /* ── فوتر ── */
        .footer-text {
            margin-top: 1.8rem;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .admin-link {
            display: inline-block;
            margin-top: 0.8rem;
            color: rgba(255,255,255,0.55);
            font-size: 0.8rem;
            text-decoration: none;
            padding: 5px 14px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            transition: all 0.3s;
        }
        .admin-link:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.4); }

        /* ── موبايل ── */
        @media (max-width: 480px) {
            .hero { padding: 2.2rem 1.8rem 2rem; border-radius: 22px; }
            .hero-title { font-size: 1.7rem; }
            .features { grid-template-columns: 1fr; }
            .hero-icon { width: 76px; height: 76px; font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <button class="theme-btn" onclick="toggleDarkMode()" aria-label="تبديل الوضع">
        <span id="modeIcon">🌙</span>
    </button>

    <div class="hero">
        <div class="hero-icon">⏰</div>

        <h1 class="hero-title">حاسبة ساعات العمل</h1>
        <p class="hero-subtitle">تتبّع ساعات عملك اليومية والشهرية بدقة،<br>مع متابعة الإضافي والنواقص</p>

        <div class="features">
            <div class="feature-pill"><span>📅</span> تسجيل يومي</div>
            <div class="feature-pill"><span>📊</span> تقرير شهري</div>
            <div class="feature-pill"><span>⏱️</span> حساب الإضافي</div>
            <div class="feature-pill"><span>💾</span> حفظ محلي آمن</div>
            <div class="feature-pill"><span>📱</span> يعمل على الجوال</div>
            <div class="feature-pill"><span>🔒</span> بياناتك خاصة</div>
        </div>

        <a href="work_hours_app.html" class="cta-btn">ابدأ الآن ⚡</a>
    </div>

    <div class="footer-text">
        <p>بياناتك محفوظة على جهازك فقط</p>
        <a href="admin_login.html" class="admin-link">لوحة التحكم</a>
    </div>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('modeIcon').textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('darkMode', isDark);
        }
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                document.getElementById('modeIcon').textContent = '☀️';
            }
        });
    </script>
</body>
</html>
